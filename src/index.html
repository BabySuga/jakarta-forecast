<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jakarta Weather Forecast</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="container">
        <header>
            <div class="header-content">
                <h1>Jakarta Weather Forecast</h1>
                <p class="subtitle">Next 5 Days</p>
            </div>
            <div class="header-info">
                <div id="current-datetime"></div>
                <button id="refresh-btn" aria-label="Refresh weather data">
                    <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="feather feather-refresh-cw"><polyline points="23 4 23 10 17 10"></polyline><polyline points="1 20 1 14 7 14"></polyline><path d="M20.49 9A9 9 0 0 0 5.64 5.64L1 10m22 4l-4.64 4.36A9 9 0 0 1 3.51 15"></path></svg>
                </button>
            </div>
        </header>

        <main id="forecast-container" class="forecast-container">
            <!-- Skeleton loaders -->
            <div class="card skeleton"></div>
            <div class="card skeleton"></div>
            <div class="card skeleton"></div>
            <div class="card skeleton"></div>
            <div class="card skeleton"></div>
        </main>

        <div id="error-container" class="error-container" style="display: none;">
            <div class="card error-card">
                <h2>Oops! Something went wrong.</h2>
                <p id="error-message">Could not fetch weather data. Please try again later.</p>
            </div>
        </div>
        
        <footer>
            <p>Last updated: <span id="last-updated">N/A</span></p>
        </footer>
    </div>
    <script type="module" src="/app.js"></script>
</body>
</html>
